name: Database Migration CI

on:
  push:
    paths:
      - "migrations/**"
      - ".github/workflows/database-migration-ci.yml"

  pull_request:
    paths:
      - "migrations/**"
      - ".github/workflows/database-migration-ci.yml"

jobs:
  migration-test:
    name: Test MySQL Migration
    runs-on: ubuntu-latest

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_USER: root
      DB_PASS: ${{ secrets.DB_PASS }}
      DB_NAME: ${{ secrets.DB_NAME }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Start MySQL
        run: |
          docker run -d \
            --name mysql \
            -e MYSQL_ROOT_PASSWORD=$DB_PASS \
            -e MYSQL_DATABASE=$DB_NAME \
            -p "$DB_PORT":3306 \
            mysql:8.4

      - name: Wait for MySQL
        run: |
          until docker exec mysql mysqladmin ping \
            -h"$DB_HOST" \
            -p"$DB_PASS" \
            --silent; do
            sleep 2
          done

      - name: Install Goose
        run: |
          go install github.com/pressly/goose/v3/cmd/goose@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Run Migration Up
        run: |
          goose \
            -dir migrations \
            mysql \
            "$DB_USER:$DB_PASS@tcp($DB_HOST:$DB_PORT)/$DB_NAME" \
            up

      - name: Verify Database Schema
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client

          mysql \
            -h $DB_HOST \
            -P $DB_PORT \
            -u$DB_USER \
            -p$DB_PASS \
            $DB_NAME \
            -e "
              SHOW TABLES;

              SELECT table_name
              FROM information_schema.tables
              WHERE table_schema='$DB_NAME'
              AND table_name IN (
                'table_category',
                'table_location',
                'table_brand',
                'table_item'
              );
            "

      - name: Test Migration Down
        run: |
          goose \
            -dir migrations \
            mysql \
            "$DB_USER:$DB_PASS@tcp($DB_HOST:$DB_PORT)/$DB_NAME" \
            down

      - name: Stop MySQL
        if: always()
        run: |
          docker rm -f mysql