name: Database Migration CI

on:
  push:
    branches:
      - sqlite-main
      - "feature/**"
    paths:
      - "migrations/**"
      - ".github/workflows/database-migration-ci.yml"

  pull_request:
    branches:
      - sqlite-main
      - "feature/**"
    paths:
      - "migrations/**"
      - ".github/workflows/database-migration-ci.yml"

jobs:
  migration-test:
    name: Test SQLite Migration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install Goose
        run: |
          go install github.com/pressly/goose/v3/cmd/goose@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Create SQLite Database
        run: |
          mkdir -p database
          touch database/database.db

      - name: Run Migration Up
        run: |
          goose \
            -dir migrations \
            sqlite3 \
            database/database.db \
            up

      - name: Verify Tables
        run: |
          sudo apt-get update
          sudo apt-get install -y sqlite3

          sqlite3 database/database.db <<EOF
          .tables

          SELECT name
          FROM sqlite_master
          WHERE type='table'
          AND name IN (
            'table_category',
            'table_location',
            'table_brand',
            'table_item'
          );
          EOF

      - name: Test Migration Down
        run: |
          goose \
            -dir migrations \
            sqlite3 \
            database/database.db \
            down